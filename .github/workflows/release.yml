name: Release

# 打 v* 标签自动构建前端、打包 zip 并创建 GitHub Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
      - name: Package
        run: |
          mkdir -p /tmp/pkg/MovieTranslator
          rsync -a \
            --exclude '.git' --exclude '.github' \
            --exclude 'backend/.venv' --exclude 'frontend/node_modules' \
            --exclude '__pycache__' --exclude '.pytest_cache' \
            ./ /tmp/pkg/MovieTranslator/
          cd /tmp/pkg && zip -rq "$GITHUB_WORKSPACE/MovieTranslator-${GITHUB_REF_NAME}.zip" MovieTranslator
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MovieTranslator-*.zip
          generate_release_notes: true
